<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Briefing - AI 安全简报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaeef2;
            --border-color: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --text-muted: #8c959f;
            --accent-blue: #0969da;
            --accent-green: #1a7f37;
            --accent-red: #cf222e;
            --accent-purple: #8250df;
            --accent-orange: #9a6700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            padding: 48px 0 32px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 48px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h1 .shield-icon {
            font-size: 32px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 400;
        }

        .header-right {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .badge.active {
            background: rgba(26, 127, 55, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        /* Main Content */
        main {
            padding-bottom: 64px;
        }

        /* Briefing List */
        .briefing-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .briefing-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .briefing-item:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 4px 12px rgba(9, 105, 218, 0.1);
            transform: translateX(4px);
        }

        .briefing-item.new {
            border-color: var(--accent-blue);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(9, 105, 218, 0.04) 100%);
        }

        .briefing-item.new::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-blue);
        }

        .briefing-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .briefing-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .new-badge {
            background: rgba(9, 105, 218, 0.1);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .briefing-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .briefing-title a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .briefing-title a:hover {
            color: var(--accent-blue);
        }

        .briefing-summary {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .briefing-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .read-more {
            color: var(--accent-blue);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        .article-count {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-state p {
            margin-bottom: 16px;
            font-size: 16px;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 32px 0;
            text-align: center;
        }

        .footer-content {
            color: var(--text-muted);
            font-size: 14px;
        }

        .footer-content a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .footer-content a:hover {
            text-decoration: underline;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }

        .footer-links a {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 16px;
            }

            .header-left h1 {
                font-size: 24px;
            }

            .briefing-item {
                padding: 20px;
            }

            .briefing-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <h1>
                        <span class="shield-icon">🛡️</span>
                        AI Security Briefing
                    </h1>
                    <div class="subtitle">每日 AI 安全动态 · 全球技术视野</div>
                </div>
                <div class="header-right">
                    <span class="badge active">● Live</span>
                    <span class="badge">Daily Updates</span>
                    <span class="badge">Open Source</span>
                </div>
            </div>
        </header>

        <main>
            <div class="briefing-list">
                <article class="briefing-item new">
                    <div class="briefing-header">
                        <span class="briefing-date">2026-03-10</span>
                        <span class="new-badge">New</span>
                    </div>
                    <h2 class="briefing-title">
                        <a href="ai-security-20260310.html">AI 安全简报 2026-03-10</a>
                    </h2>
                    <div class="briefing-summary">
                        政府工作报告首提"打造智能经济新形态"；AI 可能传播 15 年老漏洞；德克萨斯州 30 万份车祸报告数据泄露；欧盟 AI 法案实施细节明确
                    </div>
                    <div class="briefing-meta">
                        <a href="ai-security-20260310.html" class="read-more">
                            阅读全文 <span>→</span>
                        </a>
                        <span class="article-count">8 篇文章</span>
                    </div>
                </article>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>AI Security Briefing — 开源 AI 安全情报项目</p>
                <div class="footer-links">
                    <a href="https://github.com/caoyu/ai-security-briefing" target="_blank">GitHub</a>
                    <a href="https://github.com/caoyu/ai-security-briefing/issues" target="_blank">Issues</a>
                    <a href="https://github.com/caoyu/ai-security-briefing/blob/main/LICENSE" target="_blank">License</a>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
