<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 安全简报总览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }
        h1 { color: #e94560; font-size: 2em; margin-bottom: 10px; }
        .subtitle { color: #888; }
        
        .briefing-list { display: flex; flex-direction: column; gap: 20px; }
        .briefing-item {
            background: #16213e;
            padding: 25px;
            border-radius: 8px;
            border-left: 3px solid #0f3460;
            position: relative;
        }
        .briefing-item.new {
            border-left-color: #e94560;
            background: linear-gradient(135deg, #16213e 0%, #1a1a3e 100%);
        }
        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e94560;
            color: #fff;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
        }
        .briefing-date { color: #e94560; font-size: 0.9em; margin-bottom: 8px; }
        .briefing-title { margin-bottom: 10px; }
        .briefing-title a {
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
        }
        .briefing-title a:hover { color: #e94560; }
        .briefing-summary { color: #aaa; margin-bottom: 15px; }
        .read-more {
            color: #4fc3f7;
            text-decoration: none;
        }
        .read-more:hover { text-decoration: underline; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state p { margin-bottom: 20px; }
        
        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid #0f3460;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ AI 安全简报总览</h1>
            <div class="subtitle">每日 AI 安全动态 · 全球视野</div>
        </header>
        
        <div class="briefing-list">
            <div class="empty-state">
                <p>暂无简报</p>
                <p>第一份 AI 安全简报即将生成...</p>
            </div>
        </div>
        
        <footer>
            <p>AI Security Briefing</p>
            <p>GitHub: <a href="https://github.com/caoyu/ai-security-briefing" target="_blank" style="color: #4fc3f7;">caoyu/ai-security-briefing</a></p>
        </footer>
    </div>
</body>
</html>
